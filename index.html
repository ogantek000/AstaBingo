<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINGO</title>


<img src="IMG_2834.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700;900&family=Barlow+Condensed:wght@500;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
--red: #D9232A;
--black: #111;
--white: #F5F2EE;
--cell-bg: #1a1a1a;
--marked-bg: #D9232A;
--marked-text: #fff;
--border: #333;
--win-glow: #D9232A;
}

body {
background: linear-gradient(135deg, #000 0%, #2a0000 100%);
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
font-family: 'Barlow Condensed', sans-serif;
padding: 24px 16px;
gap: 20px;
}

/* CARD */
.card-wrap {
background: var(--black);
border-radius: 8px;
padding: 10px;
border: 2px solid var(--red);
box-shadow: 0 0 25px rgba(217,35,42,0.5), 0 20px 60px rgba(0,0,0,0.9);
max-width: 600px;
width: 100%;
}

/* HEADER */
.bingo-header {
display: grid;
grid-template-columns: repeat(5, 1fr);
gap: 4px;
margin-bottom: 8px;
}

.bingo-letter {
font-family: 'Oswald', sans-serif;
font-weight: 900;
font-size: clamp(28px, 6vw, 52px);
text-align: center;
padding: 8px;
border-radius: 4px;
border: 2px solid var(--red);
}

.bingo-letter:nth-child(odd) {
background: #000;
color: #fff;
}

.bingo-letter:nth-child(even) {
background: var(--red);
color: #fff;
}

/* GRID */
.bingo-grid {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 4px;
}

.cell {
background: var(--cell-bg);
border: 2px solid var(--border);
border-radius: 4px;
padding: 14px 10px;
text-align: center;
font-weight: 700;
font-size: clamp(12px, 2.2vw, 17px);
cursor: pointer;
min-height: 80px;
display: flex;
align-items: center;
justify-content: center;
position: relative;
color: #fff;
transition: all 0.15s;
}

.cell::after {
content: '✓';
position: absolute;
top: 4px;
right: 6px;
font-size: 18px;
opacity: 0;
transition: opacity 0.15s;
}

.cell:hover:not(.marked) {
background: #2a2a2a;
transform: scale(1.03);
}

.cell.marked {
background: var(--red);
color: #fff;
border-color: #ff0000;
transform: scale(0.97);
}

.cell.marked::after {
opacity: 1;
}

.cell.winning {
animation: win-pulse 0.6s infinite alternate;
}

@keyframes win-pulse {
from { box-shadow: 0 0 0 0 rgba(217,35,42,0.7); }
to   { box-shadow: 0 0 0 12px rgba(217,35,42,0); }
}

/* CONTROLS */
.controls {
display: flex;
justify-content: space-between;
width: 100%;
max-width: 600px;
}

.status {
color: #ccc;
font-size: 15px;
}

.status span {
color: var(--red);
font-weight: 700;
}

.reset-btn {
font-family: 'Oswald', sans-serif;
background: transparent;
color: #aaa;
border: 2px solid #555;
padding: 8px 20px;
cursor: pointer;
}

.reset-btn:hover {
background: var(--red);
color: #fff;
border-color: var(--red);
}

/* WIN SCREEN */
.win-banner {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.9);
z-index: 100;
flex-direction: column;
align-items: center;
justify-content: center;
}

.win-banner.show {
display: flex;
}

.win-text {
font-family: 'Oswald', sans-serif;
font-size: clamp(60px, 18vw, 130px);
color: var(--red);
text-shadow: 0 0 40px red, 0 0 80px rgba(217,35,42,0.8);
}

.win-sub {
color: #fff;
font-size: 20px;
margin-top: 10px;
}

.win-close {
margin-top: 20px;
background: var(--red);
color: #fff;
border: none;
padding: 12px 30px;
cursor: pointer;
}
</style>
</head>

<body>

<div class="card-wrap">
  <div class="bingo-header">
    <div class="bingo-letter">B</div>
    <div class="bingo-letter">I</div>
    <div class="bingo-letter">N</div>
    <div class="bingo-letter">G</div>
    <div class="bingo-letter">O</div>
  </div>

  <div class="bingo-grid" id="grid"></div>
</div>

<div class="controls">
  <div class="status">Zaznaczono: <span id="count">0</span> / 16</div>
  <button class="reset-btn" onclick="reset()">Reset</button>
</div>

<div class="win-banner" id="winBanner">
  <div class="win-text">BINGO!</div>
  <div class="win-sub">Masz linię!</div>
  <button class="win-close" onclick="closeWin()">Graj dalej</button>
</div>

<script>
const items = [
"Goat hypuje\nKachelka",
"Rage na\nsędziów",
"Szefowa\nbrawo",
"Goat Adam",
"Interakcja\nz ludźmi",
"Goat chwali\nKachelka",
"Odwrócenie się\ndo kogoś",
"Goat Chylu",
"Kimbrough\nprzeszkadza",
"Andrzejewski\ndunk",
"Gruszecki\n<3 lub >14",
"Ziemo\nz browarem",
"Szerszeń\nspawn",
"FT między\nkwartami",
"67 na\ntablicy",
"Dziadziuś w\nkurtce PSG"
];

const COLS = 4;
const ROWS = 4;
let marked = new Array(16).fill(false);
let wonLines = new Set();

const grid = document.getElementById('grid');
const countEl = document.getElementById('count');
const winBanner = document.getElementById('winBanner');

function render() {
grid.innerHTML = '';
items.forEach((text, i) => {
const cell = document.createElement('div');
cell.className = 'cell' + (marked[i] ? ' marked' : '');
cell.innerHTML = text.replace(/\n/g, '<br>');
cell.onclick = () => toggle(i);
grid.appendChild(cell);
});
countEl.textContent = marked.filter(Boolean).length;
checkWin();
}

function toggle(i) {
marked[i] = !marked[i];
render();
}

function getLines() {
const lines = [];
for (let r = 0; r < ROWS; r++) {
lines.push([r*COLS, r*COLS+1, r*COLS+2, r*COLS+3]);
}
for (let c = 0; c < COLS; c++) {
lines.push([c, c+COLS, c+COLS*2, c+COLS*3]);
}
lines.push([0,5,10,15]);
lines.push([3,6,9,12]);
return lines;
}

function checkWin() {
const lines = getLines();
let newWin = false;
const cells = grid.querySelectorAll('.cell');

lines.forEach(line => {
const key = line.join(',');
if (line.every(i => marked[i])) {
if (!wonLines.has(key)) {
wonLines.add(key);
newWin = true;
}
line.forEach(i => cells[i] && cells[i].classList.add('winning'));
}
});

if (newWin) {
setTimeout(() => winBanner.classList.add('show'), 200);
}
}

function closeWin() {
winBanner.classList.remove('show');
}

function reset() {
marked = new Array(16).fill(false);
wonLines.clear();
winBanner.classList.remove('show');
render();
}

render();
</script>

</body>
</html>
