<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BINGO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red: #E8202A;
  --red-dark: #9e0a10;
  --red-glow: rgba(232,32,42,0.6);
  --black: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --text: #f0ece6;
  --muted: #888;
}

body {
  background: var(--black);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  padding: 20px;
}

/* CARD */
.card-wrap {
  width: 100%;
  max-width: 560px;
  background: var(--surface);
  border: 1px solid var(--border);
}

.card-photo {
  width: 100%;
  max-height: 220px;
  object-fit: cover;
}

.top-stripe {
  height: 4px;
  background: var(--red);
}

.card-inner {
  padding: 16px;
}

/* HEADER */
.bingo-header {
  display: grid;
  grid-template-columns: repeat(5,1fr);
  gap: 6px;
  margin-bottom: 16px;
}

.bingo-letter {
  font-family: 'Bebas Neue';
  font-size: 40px;
  text-align: center;
  padding: 10px;
}

.bingo-letter:nth-child(odd) {
  background: black;
  color: white;
}

.bingo-letter:nth-child(even) {
  background: var(--red);
  color: white;
}

/* GRID */
.bingo-grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 6px;
}

.cell {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 10px;
  text-align: center;
  cursor: pointer;
  color: #ccc;
  min-height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cell.marked {
  background: var(--red);
  color: white;
}

/* BOTTOM */
.bottom-bar {
  max-width: 560px;
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}

.progress-wrap {
  flex: 1;
  height: 4px;
  background: #222;
}

.progress-bar {
  height: 100%;
  background: var(--red);
  width: 0%;
}

button {
  padding: 6px 12px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card-wrap" id="cardWrap">
  <div class="top-stripe"></div>
  <img src="IMG_2834.png" class="card-photo">

  <div class="card-inner">
    <div class="bingo-header">
      <div class="bingo-letter">B</div>
      <div class="bingo-letter">I</div>
      <div class="bingo-letter">N</div>
      <div class="bingo-letter">G</div>
      <div class="bingo-letter">O</div>
    </div>

    <div class="bingo-grid" id="grid"></div>
  </div>
</div>

<div class="bottom-bar">
  <div id="count">0</div>
  <div class="progress-wrap"><div id="progressBar" class="progress-bar"></div></div>
  <button onclick="reset()">Reset</button>
</div>

<script>
const items = [
"Goat hypuje Kachelka","Rage na sędziów","Szefowa brawo","Goat Adam",
"Interakcja z ludźmi","Goat chwali Kachelka","Odwrócenie się","Goat Chylu",
"Kimbrough przeszkadza","Andrzejewski dunk","Gruszecki <3",
"Ziemo z browarem","Szerszeń spawn","FT między kwartami",
"67 na tablicy","Dziadziuś PSG"
];

let marked = new Array(16).fill(false);

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  items.forEach((t,i)=>{
    const d=document.createElement("div");
    d.className="cell"+(marked[i]?" marked":"");
    d.innerHTML=t;
    d.onclick=()=>{marked[i]=!marked[i];render();};
    grid.appendChild(d);
  });

  const n = marked.filter(x=>x).length;
  document.getElementById("count").innerText = n;
  document.getElementById("progressBar").style.width = (n/16*100)+"%";
}

function reset(){
  marked.fill(false);
  render();
}

render();
</script>

</body>
</html>
